name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: web

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: launchcv_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d launchcv_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      AUTH_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-12chars
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/launchcv_ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npx prisma db push && npx prisma generate
      - run: npm run lint
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
